name: Hershild CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: /api
        run: npm run build

      - name: Verify build output
        run: |
          echo "Frontend build files:"
          ls -la frontend/build/
          echo "---"
          echo "Backend files:"
          ls -la backend/

      - name: Start server and test health
        working-directory: ./backend
        env:
          NODE_ENV: production
          PORT: 5000
          ACCESS_TOKEN_SECRET: ci-test-secret-access
          REFRESH_TOKEN_SECRET: ci-test-secret-refresh
          ACCESS_TOKEN_EXPIRY: 15m
          REFRESH_TOKEN_EXPIRY: 7d
          OTP_EXPIRY_MINUTES: 10
        run: |
          node server.js &
          sleep 3
          curl -f http://localhost:5000/api/health || exit 1
          echo ""
          echo "✅ Health check passed!"
          curl -s http://localhost:5000 | head -c 200
          echo ""
          echo "✅ Frontend served successfully!"
          kill %1

      - name: Build summary
        run: |
          echo "🛡️ Hershild Build Summary"
          echo "========================="
          echo "✅ Backend: Dependencies installed"
          echo "✅ Frontend: Built successfully"
          echo "✅ Production server: Health check passed"
          echo "✅ React app: Served by Express"
          echo ""
          echo "Ready for deployment!"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          echo "🚀 Triggering Render deployment..."
          curl -s "${{ vars.RENDER_DEPLOY_HOOK_URL }}" || true
          echo "✅ Deploy triggered!"

      - name: Deploy Summary
        run: |
          echo "🛡️ Hershild Deploy"
          echo "==================="
          echo "Branch: main"
          echo "Commit: ${{ github.sha }}"
          echo "✅ Build passed → Deploy triggered"
